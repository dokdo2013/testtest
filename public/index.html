<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CIME 장점 공유</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>CIME의 <span>장점</span>을 공유하세요</h1>
      <p class="subtitle"><span class="live-dot"></span>실시간 커뮤니티 보드</p>
    </header>

    <form id="post-form" class="compose">
      <div class="compose-label">새 글 작성</div>
      <div class="input-row">
        <input
          type="text"
          id="nickname"
          placeholder="닉네임을 입력하세요"
          maxlength="50"
          required
          autocomplete="off"
        />
      </div>
      <textarea
        id="content"
        placeholder="CIME 서비스를 사용하면서 느낀 장점을 자유롭게 공유해주세요"
        rows="3"
        required
      ></textarea>
      <div class="compose-footer">
        <div class="typing-indicator" id="typing-indicator"></div>
        <button type="submit">게시하기</button>
      </div>
    </form>

    <div class="posts-section">
      <div class="posts-header">
        <h2>공유된 장점</h2>
        <span class="post-count" id="post-count">0건</span>
      </div>
      <div id="posts"></div>
    </div>
  </div>

  <div class="connection-status" id="connection-status"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const form = document.getElementById("post-form");
    const postsDiv = document.getElementById("posts");
    const nicknameInput = document.getElementById("nickname");
    const contentInput = document.getElementById("content");
    const typingEl = document.getElementById("typing-indicator");
    const postCountEl = document.getElementById("post-count");
    const connStatus = document.getElementById("connection-status");

    let postCount = 0;
    let typingTimeout = null;

    /* ─── Connection status ─── */
    socket.on("connect", function () {
      connStatus.textContent = "connected";
      connStatus.className = "connection-status visible connected";
      setTimeout(function () { connStatus.classList.remove("visible"); }, 2000);
    });

    socket.on("disconnect", function () {
      connStatus.textContent = "reconnecting...";
      connStatus.className = "connection-status visible disconnected";
    });

    /* ─── Typing indicator ─── */
    function emitTyping() {
      var nick = nicknameInput.value.trim();
      socket.emit("typing", { nickname: nick || "" });
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(function () {
        socket.emit("stopTyping");
      }, 3000);
    }

    contentInput.addEventListener("input", emitTyping);
    nicknameInput.addEventListener("input", function () {
      if (contentInput.value.trim()) emitTyping();
    });

    socket.on("typingUsers", function (names) {
      if (!names || names.length === 0) {
        typingEl.textContent = "";
        typingEl.className = "typing-indicator";
        return;
      }

      typingEl.className = "typing-indicator active";
      typingEl.replaceChildren();

      var text;
      if (names.length === 1) {
        text = names[0] + "님이 작성 중";
      } else if (names.length === 2) {
        text = names[0] + ", " + names[1] + "님이 작성 중";
      } else {
        text = names[0] + " 외 " + (names.length - 1) + "명이 작성 중";
      }

      var span = document.createElement("span");
      span.textContent = text;
      typingEl.appendChild(span);

      var dots = document.createElement("span");
      dots.className = "typing-dots";
      for (var i = 0; i < 3; i++) {
        dots.appendChild(document.createElement("span"));
      }
      typingEl.appendChild(dots);
    });

    /* ─── Post card ─── */
    function createPostCard(post, animate) {
      var card = document.createElement("div");
      card.className = animate ? "card card-enter" : "card";

      var header = document.createElement("div");
      header.className = "card-header";

      var name = document.createElement("span");
      name.className = "card-nickname";
      name.textContent = post.nickname;

      var date = document.createElement("span");
      date.className = "card-date";
      date.textContent = new Date(post.createdAt).toLocaleString("ko-KR");

      header.appendChild(name);
      header.appendChild(date);

      var body = document.createElement("p");
      body.className = "card-content";
      body.textContent = post.content;

      card.appendChild(header);
      card.appendChild(body);
      return card;
    }

    function updateCount(n) {
      postCount = n;
      postCountEl.textContent = n + "건";
    }

    /* ─── Load posts ─── */
    async function loadPosts() {
      var res = await fetch("/api/posts");
      var posts = await res.json();
      postsDiv.replaceChildren();
      posts.forEach(function (post) {
        postsDiv.appendChild(createPostCard(post, false));
      });
      updateCount(posts.length);
    }

    /* ─── Real-time new post ─── */
    socket.on("newPost", function (post) {
      postsDiv.prepend(createPostCard(post, true));
      updateCount(postCount + 1);
    });

    /* ─── Submit ─── */
    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      var nickname = nicknameInput.value.trim();
      var content = contentInput.value.trim();
      if (!nickname || !content) return;

      socket.emit("stopTyping");
      clearTimeout(typingTimeout);

      var res = await fetch("/api/posts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nickname: nickname, content: content }),
      });

      if (res.ok) {
        contentInput.value = "";
        contentInput.focus();
      }
    });

    loadPosts();
  </script>
</body>
</html>
